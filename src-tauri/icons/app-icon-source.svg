<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a2a2e"/>
      <stop offset="1" stop-color="#0a0a0c"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f7"/>
      <stop offset="0.5" stop-color="#a1a1a6"/>
      <stop offset="1" stop-color="#3a3a3c"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- Logo (bar chart + dot), scaled and centered -->
  <g transform="translate(60, 72) scale(40)">
    <rect x="3" y="4" width="6.4" height="16" rx="3.2" fill="url(#logoGrad)"/>
    <rect x="10.6" y="10" width="6.4" height="10" rx="3.0" fill="url(#logoGrad)"/>
    <circle cx="17.6" cy="4" r="2" fill="url(#logoGrad)"/>
  </g>
</svg>
