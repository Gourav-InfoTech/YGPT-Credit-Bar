<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YGPTCreditBar Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="settings-body">
    <main class="settings">
      <header class="settings__header">
        <div class="settings__brand">
          <div class="settings__logo" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="currentColor">
              <rect x="3" y="4" width="6.4" height="16" rx="3.2"/>
              <rect x="10.6" y="10" width="6.4" height="10" rx="3.0"/>
              <circle cx="17.6" cy="4" r="2"/>
            </svg>
          </div>
          <div class="settings__brand-text">
            <h1 class="settings__title">YGPT Credit Bar</h1>
            <p class="settings__subtitle">Live YourGPT usage in your menu bar.</p>
          </div>
        </div>
      </header>

      <section class="settings__section">
        <label class="settings__label" for="pat-input">Session token</label>
        <input
          id="pat-input"
          type="password"
          class="settings__input"
          placeholder="Paste your YourGPT session JWT"
          autocomplete="off"
          spellcheck="false"
        />
        <p class="settings__hint">
          Log in to <a href="#" id="how-to-link">chatbot.yourgpt.ai</a>, open DevTools (⌥⌘I) → <strong>Application</strong> → <strong>Cookies</strong>, and copy the value of your auth cookie.
        </p>
      </section>

      <section class="settings__section">
        <label class="settings__label" for="org-select">Organization</label>
        <select id="org-select" class="settings__input" disabled>
          <option value="">Paste a token to load your organizations…</option>
        </select>
        <p class="settings__hint" id="org-status"></p>
      </section>

      <section class="settings__section">
        <label class="settings__label" for="interval-input">Refresh every</label>
        <div class="settings__interval">
          <input
            id="interval-input"
            type="number"
            class="settings__input settings__input--inline"
            min="15"
            max="300"
            step="5"
            value="30"
          />
          <span class="settings__interval-suffix">seconds</span>
        </div>
      </section>

      <footer class="settings__footer">
        <div class="settings__footer-left">
          <button id="remove-btn" class="btn btn--danger hidden">Log out</button>
          <span class="settings__version" aria-hidden="true">v0.1.2</span>
        </div>
        <div class="settings__footer-right">
          <button id="cancel-btn" class="btn btn--secondary">Cancel</button>
          <button id="save-btn" class="btn btn--primary" disabled>Save</button>
        </div>
      </footer>

      <div class="settings__toast hidden" id="toast"></div>
    </main>
    <script src="settings.js"></script>
  </body>
</html>
